name: definition-blackboard-database-cd

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - aks
          - onprem
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - preprod
          - prod

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  prod-deploy:
    if: ${{ github.event.inputs.target == 'aks' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
      - name: Validate required deploy secret
        run: |
          test -n "${{ secrets.DB_PASSWORD }}" || {
            echo "Missing required environment secret: DB_PASSWORD" >&2
            exit 1
          }
      - name: Deploy with Makefile
        run: |
          make prod-deploy \
            DEPLOY_ENV=${{ github.event.inputs.environment }} \
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

  deploy-onprem:
    if: ${{ github.event.inputs.target == 'onprem' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package helm chart
        run: make package-helm
      - name: Upload helm package
        uses: actions/upload-artifact@v4
        with:
          name: definition-blackboard-database-helm-package
          path: "*.tgz"
