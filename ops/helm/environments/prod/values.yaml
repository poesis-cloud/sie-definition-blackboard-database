# Prod environment values

nameOverride: ""
fullnameOverride: ""

image:
  repository: postgres
  tag: "16.3"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 5432
  annotations: {}

postgres:
  user: sie
  database: sie_definition_blackboard
  existingSecret: ""
  extensions: []

secrets:
  DB_PASSWORD: ""

initdb:
  enabled: true
  extraScripts: {}

persistence:
  enabled: true
  size: 20Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
