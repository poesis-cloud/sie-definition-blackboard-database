apiVersion: v1
kind: Service
metadata:
  name: {{ include "sie-definition-blackboard-database.fullname" . }}
  labels:
    {{- include "sie-definition-blackboard-database.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.service.annotations | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: postgres
      port: {{ .Values.service.port }}
      targetPort: postgres
  selector:
    app.kubernetes.io/name: {{ include "sie-definition-blackboard-database.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
