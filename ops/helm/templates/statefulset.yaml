apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "sie-definition-blackboard-database.fullname" . }}
  labels:
    {{- include "sie-definition-blackboard-database.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "sie-definition-blackboard-database.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sie-definition-blackboard-database.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sie-definition-blackboard-database.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-auth" (include "sie-definition-blackboard-database.fullname" .)) .Values.postgres.existingSecret }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            {{- if and .Values.initdb.enabled (or (gt (len (.Files.Glob "def/*.sql")) 0) (gt (len .Values.postgres.extensions) 0) (gt (len .Values.initdb.extraScripts) 0)) }}
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            {{- end }}
      {{- if or (and .Values.initdb.enabled (or (gt (len (.Files.Glob "def/*.sql")) 0) (gt (len .Values.postgres.extensions) 0) (gt (len .Values.initdb.extraScripts) 0))) (not .Values.persistence.enabled) }}
      volumes:
        {{- if and .Values.initdb.enabled (or (gt (len (.Files.Glob "def/*.sql")) 0) (gt (len .Values.postgres.extensions) 0) (gt (len .Values.initdb.extraScripts) 0)) }}
        - name: initdb
          configMap:
            name: {{ include "sie-definition-blackboard-database.fullname" . }}-initdb
        {{- end }}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
  {{- end }}
