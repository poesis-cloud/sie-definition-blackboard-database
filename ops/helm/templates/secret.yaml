{{- if not .Values.postgres.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sie-definition-blackboard-database.fullname" . }}-auth
  labels:
    {{- include "sie-definition-blackboard-database.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "Set secrets.DB_PASSWORD or postgres.existingSecret for sie-definition-blackboard-database" .Values.secrets.DB_PASSWORD | quote }}
{{- end }}
